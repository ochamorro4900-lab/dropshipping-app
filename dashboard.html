<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DropShop - Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#f5f6fa; }
    .layout { display:flex; min-height:100vh; }

    /* Sidebar */
    .sidebar {
      width:240px; background:white;
      box-shadow:2px 0 12px rgba(0,0,0,0.06);
      display:flex; flex-direction:column;
      padding:28px 0;
    }
    .brand { padding:0 24px 24px; border-bottom:1px solid #dcdde1; }
    .brand h2 { color:#6C63FF; font-size:1.2rem; }
    nav { padding:16px 0; flex:1; }
    nav a {
      display:block; padding:12px 24px;
      color:#636e72; text-decoration:none;
      font-size:0.93rem; transition:0.2s;
    }
    nav a:hover { background:#f0eeff; color:#6C63FF; font-weight:600; }
    .logout {
      margin:12px 16px; padding:10px;
      background:none; border:1.5px solid #e74c3c;
      color:#e74c3c; border-radius:8px;
      cursor:pointer; font-size:0.9rem;
      transition:0.2s;
    }
    .logout:hover { background:#e74c3c; color:white; }

    /* Main */
    .main { flex:1; padding:32px; overflow-y:auto; }
    .user-bar {
      background:white; border-radius:12px;
      padding:16px 20px; display:flex;
      align-items:center; gap:12px;
      box-shadow:0 4px 20px rgba(0,0,0,0.08);
      margin-bottom:24px;
    }
    .avatar {
      width:40px; height:40px;
      background:#6C63FF; border-radius:50%;
      display:flex; align-items:center;
      justify-content:center; color:white;
      font-weight:700; font-size:1rem;
    }
    .info span { display:block; font-size:0.8rem; color:#636e72; }
    .info strong { font-size:0.95rem; }
    h1 { font-size:1.5rem; margin-bottom:24px; color:#2d3436; }

    /* Stats */
    .stats {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
      gap:20px; margin-bottom:32px;
    }
    .stat {
      background:white; border-radius:12px;
      padding:22px 20px;
      box-shadow:0 4px 20px rgba(0,0,0,0.08);
    }
    .stat .label { font-size:0.82rem; color:#636e72; margin-bottom:8px; }
    .stat .value { font-size:1.8rem; font-weight:700; color:#6C63FF; }
    .note { color:#636e72; font-size:0.9rem; }
  </style>
</head>
<body>
  <div class="layout">

    <aside class="sidebar">
      <div class="brand"><h2>🛒 DropShop</h2></div>
      <nav>
        <a href="#">📊 Dashboard</a>
        <a href="#">📦 Productos</a>
        <a href="#">🛍️ Pedidos</a>
        <a href="#">🏭 Proveedores</a>
        <a href="#">📈 Métricas</a>
        <a href="#">⚙️ Configuración</a>
      </nav>
      <button class="logout" onclick="logout()">🚪 Cerrar sesión</button>
    </aside>

    <main class="main">
      <div class="user-bar">
        <div class="avatar" id="avatar">?</div>
        <div class="info">
          <span>Bienvenido de vuelta</span>
          <strong id="nombre">Cargando...</strong>
        </div>
      </div>

      <h1>Panel de control</h1>

      <div class="stats">
        <div class="stat">
          <div class="label">Pedidos hoy</div>
          <div class="value" id="pedidos">0</div>
        </div>
        <div class="stat">
          <div class="label">Productos activos</div>
          <div class="value" id="productos">0</div>
        </div>
        <div class="stat">
          <div class="label">Proveedores</div>
          <div class="value" id="proveedores">0</div>
        </div>
        <div class="stat">
          <div class="label">Ventas del mes</div>
          <div class="value" id="ventas">$0</div>
        </div>
      </div>

      <p class="note">Módulos de productos, pedidos y proveedores en desarrollo. 🚀</p>
    </main>
  </div>

  <script>
    const { createClient } = supabase

    const client = createClient(
      'https://wdvoyyujxcxftrbjkwjk.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indkdm95eXVqeGN4ZnRyYmprd2prIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2ODE4NzYsImV4cCI6MjA5MzI1Nzg3Nn0.z9jVhzA2bZeI5XcD8k3bSXXt6RVAnpGG2h95c9jIBA8'
    )

    async function init() {
      const { data: { session } } = await client.auth.getSession()

      if (!session) {
        window.location.href = 'index.html'
        return
      }

      const user = session.user
      const nombre = user.user_metadata?.nombre_completo || user.email
      document.getElementById('nombre').textContent = nombre
      document.getElementById('avatar').textContent = nombre.charAt(0).toUpperCase()

      // Cargar estadísticas
      const { count: totalProductos } = await client
        .from('productos').select('*', { count:'exact', head:true })
        .eq('user_id', user.id)

      const { count: totalProveedores } = await client
        .from('proveedores').select('*', { count:'exact', head:true })
        .eq('user_id', user.id)

      const hoy = new Date().toISOString().split('T')[0]
      const { count: pedidosHoy } = await client
        .from('pedidos').select('*', { count:'exact', head:true })
        .eq('user_id', user.id)
        .gte('created_at', `${hoy}T00:00:00`)

      const inicioMes = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString()
      const { data: pedidosMes } = await client
        .from('pedidos').select('total')
        .eq('user_id', user.id)
        .gte('created_at', inicioMes)

      const ventasMes = pedidosMes?.reduce((acc, p) => acc + (p.total || 0), 0) || 0

      document.getElementById('productos').textContent = totalProductos || 0
      document.getElementById('proveedores').textContent = totalProveedores || 0
      document.getElementById('pedidos').textContent = pedidosHoy || 0
      document.getElementById('ventas').textContent = `$${ventasMes.toLocaleString('es-CO')}`
    }

    async function logout() {
      await client.auth.signOut()
      window.location.href = 'index.html'
    }

    init()
  </script>
</body>
</html>
