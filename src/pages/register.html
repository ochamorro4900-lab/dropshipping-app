<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta | DropShop</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="logo">
        <h1>🛒 DropShop</h1>
        <p>Crea tu cuenta gratis</p>
      </div>

      <form id="register-form" autocomplete="off">

        <div class="form-group">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" placeholder="Oscar Andres Chamorro" required />
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tucorreo@email.com" required />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Mínimo 6 caracteres" required />
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirmar contraseña</label>
          <input type="password" id="confirm-password" placeholder="Repite tu contraseña" required />
        </div>

        <button type="submit" class="btn-primary" id="btn-register">
          Crear cuenta
        </button>

        <p class="error-msg" id="error-msg"></p>
        <p class="success-msg" id="success-msg"></p>

      </form>

      <div class="auth-footer">
        ¿Ya tienes cuenta?
        <a href="./login.html">Inicia sesión</a>
      </div>

    </div>
  </div>

  <script type="module" src="../auth/register.js"></script>

</body>
</html>
