<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión | DropShop</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="logo">
        <h1>🛒 DropShop</h1>
        <p>Plataforma de gestión dropshipping</p>
      </div>

      <form id="login-form" autocomplete="off">

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="tucorreo@email.com" required />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn-primary" id="btn-login">
          Iniciar sesión
        </button>

        <p class="error-msg" id="error-msg"></p>

      </form>

      <div class="auth-footer">
        ¿No tienes cuenta?
        <a href="./register.html">Regístrate aquí</a>
      </div>

    </div>
  </div>

  <script type="module" src="../auth/login.js"></script>

</body>
</html>
