<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DropShop - Registro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      padding: 40px 36px;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    h1 { color: #6C63FF; text-align: center; margin-bottom: 6px; }
    p.sub { text-align:center; color:#636e72; font-size:0.85rem; margin-bottom:24px; }
    label { display:block; font-size:0.85rem; font-weight:600; margin-bottom:6px; }
    input {
      width:100%; padding:11px 14px;
      border:1.5px solid #dcdde1;
      border-radius:8px; font-size:0.95rem;
      margin-bottom:16px;
    }
    input:focus { outline:none; border-color:#6C63FF; }
    button {
      width:100%; padding:12px;
      background:#6C63FF; color:white;
      border:none; border-radius:8px;
      font-size:1rem; font-weight:600;
      cursor:pointer; margin-top:4px;
    }
    button:hover { background:#574fd6; }
    .msg { text-align:center; margin-top:12px; font-size:0.85rem; }
    .error { color:#e74c3c; }
    .success { color:#2ecc71; }
    .footer { text-align:center; margin-top:20px; font-size:0.88rem; color:#636e72; }
    .footer a { color:#6C63FF; font-weight:600; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🛒 DropShop</h1>
    <p class="sub">Crea tu cuenta gratis</p>

    <label for="nombre">Nombre completo</label>
    <input type="text" id="nombre" placeholder="Oscar Andres Chamorro" />

    <label for="email">Correo electrónico</label>
    <input type="email" id="email" placeholder="tucorreo@email.com" />

    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="Mínimo 6 caracteres" />

    <label for="confirm">Confirmar contraseña</label>
    <input type="password" id="confirm" placeholder="Repite tu contraseña" />

    <button onclick="register()">Crear cuenta</button>
    <p class="msg" id="msg"></p>

    <div class="footer">
      ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
    </div>
  </div>

  <script>
    const { createClient } = supabase

    const client = createClient(
      'https://wdvoyyujxcxftrbjkwjk.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indkdm95eXVqeGN4ZnRyYmprd2prIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2ODE4NzYsImV4cCI6MjA5MzI1Nzg3Nn0.z9jVhzA2bZeI5XcD8k3bSXXt6RVAnpGG2h95c9jIBA8'
    )

    async function register() {
      const nombre = document.getElementById('nombre').value
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const confirm = document.getElementById('confirm').value
      const msg = document.getElementById('msg')

      msg.className = 'msg'
      msg.textContent = ''

      if (password.length < 6) {
        msg.className = 'msg error'
        msg.textContent = 'La contraseña debe tener mínimo 6 caracteres.'
        return
      }
      if (password !== confirm) {
        msg.className = 'msg error'
        msg.textContent = 'Las contraseñas no coinciden.'
        return
      }

      msg.textContent = 'Creando cuenta...'

      const { data, error } = await client.auth.signUp({
        email,
        password,
        options: { data: { nombre_completo: nombre } }
      })

      if (error) {
        msg.className = 'msg error'
        msg.textContent = 'Error al registrar. Intenta de nuevo.'
        return
      }

      if (data.user) {
        await client.from('perfiles').insert({
          id: data.user.id,
          nombre_completo: nombre,
          email: email,
          rol: 'vendedor'
        })
      }

      msg.className = 'msg success'
      msg.textContent = '¡Cuenta creada! Redirigiendo...'
      setTimeout(() => { window.location.href = 'dashboard.html' }, 2000)
    }
  </script>
</body>
</html>
